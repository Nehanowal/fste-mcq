        .question-card.answered-correct { border-color: #22c55e; }
        .question-card.answered-wrong { border-color: #ef4444; }

        .q-text { font-size: 1rem; line-height: 1.6; margin-bottom: 16px; color: #e2e8f0; }

        .option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; cursor: pointer; transition: all 0.2s; }
        .option:hover:not(.disabled) { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
        .option.selected { border-color: #3b82f6; background: rgba(59,130,246,0.15); }
        .option.correct { border-color: #22c55e; background: rgba(34,197,94,0.15); }
        .option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.15); }

        .option.disabled.correct { opacity: 1; }
        .option-letter { width: 28px; height: 28px; border-radius: 50%; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
        .option.correct .option-letter { background: #22c55e; color: white; }
        .option.wrong .option-letter { background: #ef4444; color: white; }
        .option-text { padding-top: 3px; line-height: 1.4; }

        .explanation { margin-top: 12px; padding: 12px 16px; background: rgba(59,130,246,0.1); border-radius: 8px; border-left: 3px solid #3b82f6; font-size: 0.9rem; color: #94a3b8; display: none; }

        .actions { text-align: center; margin-top: 30px; padding-bottom: 40px; }
        .btn { padding: 12px 32px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-outline { background: transparent; border: 2px solid #3b82f6; color: #60a5fa; }
        .btn-outline:hover { background: rgba(59,130,246,0.1); }

        .results h2 { font-size: 1.8rem; margin-bottom: 10px; }
        .results .score-big { font-size: 3rem; font-weight: bold; margin: 20px 0; }

        .results .score-big.ok { color: #f59e0b; }
        .results .score-big.low { color: #ef4444; }
        .results p { color: #94a3b8; margin-bottom: 20px; }

        .progress-bar { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width 0.3s; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.2rem; }
            .nav button { padding: 8px 14px; font-size: 0.8rem; }
            .question-card { padding: 16px; }
        }
    </style>
</head>

let currentIndex = null;
let answers = {};
let scores = {};

function setActiveNav(index) {
    document.querySelectorAll('.nav button').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });
}

function showHome() {
    setActiveNav(0);
    currentIndex = null;
    let totalQ = 0;
    quizData.forEach(section => totalQ += section.questions.length);
    document.getElementById('content').innerHTML = `
        <div class="welcome">
            <h2>Welcome to FSTE Quiz</h2>
            <p>Practice multiple choice questions topic by topic.<br>Select a section from the navigation above to begin.</p>
            <div class="stats">
                <div class="stat-card"><div class="num">${quizData.length}</div><div class="label">Sections</div></div>
                <div class="stat-card"><div class="num">${totalQ}</div><div class="label">Questions</div></div>
                <div class="stat-card"><div class="num">${Object.keys(scores).length}</div><div class="label">Completed</div></div>
            </div>
        </div>`;
}

function loadSection(idx) {
    currentIndex = idx;
    setActiveNav(idx + 1);
    answers[idx] = answers[idx] || {};
    renderQuiz();
}

function renderQuiz() {
    const data = quizData[currentIndex];
    const ans = answers[currentIndex];
    const total = data.questions.length;
    const answered = Object.keys(ans).length;
    const correct = Object.values(ans).filter(a => a.correct).length;

    let html = `
        <div class="quiz-header">
            <h2>${data.title}</h2>
            <div class="score-display">Score: <span>${correct}</span> / ${total}</div>
        </div>
        <div class="progress-bar"><div class="fill" style="width:${(answered/total)*100}%"></div></div>`;

    data.questions.forEach((question, qi) => {
        const a = ans[qi];
        let cardClass = '';
        if (a) cardClass = a.correct ? 'answered-correct' : 'answered-wrong';

        html += `<div class="question-card ${cardClass}">
            <div class="q-number">Question ${qi + 1} of ${total}</div>
            <div class="q-text">${question.q}</div>
            <div class="options">`;

        const letters = ['A', 'B', 'C', 'D'];
        question.options.forEach((opt, oi) => {
            let optClass = '';
            if (a) {
                optClass = 'disabled';
                if (oi === question.correct) optClass += ' correct';
                else if (oi === a.selected && !a.correct) optClass += ' wrong';
            }
            html += `<div class="option ${optClass}" onclick="selectAnswer(${qi}, ${oi})">
                <div class="option-letter">${letters[oi]}</div>
                <div class="option-text">${opt}</div>
            </div>`;
        });

        html += `</div>
            <div class="explanation ${a ? 'show' : ''}">${question.explanation}</div>
        </div>`;
    });

    if (answered === total) {
        const pct = Math.round((correct / total) * 100);
        let cls = pct >= 70 ? 'great' : pct >= 40 ? 'ok' : 'low';
        let msg = pct >= 70 ? 'Great job!' : pct >= 40 ? 'Good effort, review the explanations.' : 'Keep studying, you\'ll improve!';
        html += `<div class="results">
            <h2>Quiz Complete!</h2>
            <div class="score-big ${cls}">${pct}%</div>
            <p>${correct} out of ${total} correct. ${msg}</p>
            <button class="btn" onclick="resetSection()" style="margin-right:10px">Retry</button>
            <button class="btn btn-outline" onclick="showHome()">Back to Home</button>
        </div>`;
    }

    document.getElementById('content').innerHTML = html;
}

function selectAnswer(qi, oi) {
    if (answers[currentIndex][qi]) return;
    const question = quizData[currentIndex].questions[qi];
    answers[currentIndex][qi] = {
        selected: oi,
        correct: oi === question.correct
    };
    if (answers[currentIndex][qi].correct) {
        scores[currentIndex] = (scores[currentIndex] || 0) + 1;
    }
    renderQuiz();
    setTimeout(() => {
        const cards = document.querySelectorAll('.question-card');
        const nextUnanswered = quizData[currentIndex].questions.findIndex((_, i) => !answers[currentIndex][i]);
        if (nextUnanswered >= 0 && cards[nextUnanswered]) {
            cards[nextUnanswered].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }, 300);
}

function resetSection() {
    answers[currentIndex] = {};
    scores[currentIndex] = 0;
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

showHome();
</script>
